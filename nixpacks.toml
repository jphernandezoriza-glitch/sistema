[phases.setup]
nixPkgs = [
    'php82',
    'php82Extensions.pdo',
    'php82Extensions.pdo_mysql',
    'php82Extensions.mbstring',
    'php82Extensions.xml',
    'php82Extensions.gd',
    'composer'
]

[phases.install]
# Esta línea es la clave: ignora los requisitos de plataforma para que GD no detenga el proceso
cmds = ['composer install --ignore-platform-reqs --no-interaction --no-scripts']

[phases.build]
cmds = [
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache'
]

[start]
cmd = 'php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT'